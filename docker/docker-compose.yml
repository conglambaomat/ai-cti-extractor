# =====================================================================
# Phase 1 docker compose stack
# Postgres (auth + metadata + audit), Redis (queue + cache), MinIO (raw reports)
# OpenCTI lives in a separate compose file (docker/opencti/) — Phase 8 only.
# =====================================================================

services:

  postgres:
    image: postgres:16-alpine
    container_name: cti-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cti_extractor}
      POSTGRES_USER: ${POSTGRES_USER:-cti}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cti}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cti} -d ${POSTGRES_DB:-cti_extractor}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - cti-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: cti-redis
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - cti-net
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: cti-minio
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # console UI
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - cti-net
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: cti-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin};
      mc mb -p local/${S3_BUCKET:-cti-reports} || true;
      mc anonymous set download local/${S3_BUCKET:-cti-reports} || true;
      echo 'Bucket ${S3_BUCKET:-cti-reports} ready.';
      "
    networks:
      - cti-net

volumes:
  postgres_data: {}
  redis_data: {}
  minio_data: {}

networks:
  cti-net:
    driver: bridge
